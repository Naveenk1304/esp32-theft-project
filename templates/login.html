<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Electricity Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>AUTH SYSTEM</h1>
            <div class="input-group">
                <label for="username">User ID</label>
                <input type="text" id="username" placeholder="Enter User ID">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>
            <button class="login-btn" onclick="login()">Access System</button>
            <p id="error-msg" style="color: #ff3131; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();
            if (result.success) {
                window.location.href = '/dashboard';
            } else {
                errorMsg.innerText = result.message;
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
