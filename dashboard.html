<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Theft Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-container { display: flex; justify-content: space-around; margin-bottom: 20px; gap: 10px; }
        .status-box { padding: 15px; border-radius: 8px; font-weight: bold; flex: 1; background: #fff; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .chart-box { background: white; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 30px; }
        .sim-panel { margin: 20px 0; padding: 20px; background: #eee; border-radius: 8px; border: 1px dashed #999; }
        .btn { padding: 10px 20px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; margin: 5px; }
        .btn-normal { background: #28a745; color: white; }
        .btn-theft { background: #dc3545; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        .theft-alert { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; animation: blink 1s infinite; padding: 10px; border-radius: 5px; font-weight: bold; display: none; margin-bottom: 20px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .error-msg { color: #dc3545; font-size: 0.9em; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Electricity Theft Detection Dashboard</h1>
        
        <div id="theft-banner" class="theft-alert">🚨 THEFT DETECTED! ALERT SENT! 🚨</div>

        <div class="status-container">
            <div id="esp32-status" class="status-box">ESP32 Connecting... ⏳</div>
            <div id="ai-status" class="status-box">AI Initializing... ⏳</div>
            <div id="connection-error" class="error-msg">Backend unreachable ❌</div>
        </div>

        <div class="sim-panel">
            <h3>🤖 Manual ESP32 Simulator</h3>
            <p>Simulate data being sent from the device</p>
            <button class="btn btn-normal" onclick="simulateData(false)">Send Normal Data (0.5A - 2.0A)</button>
            <button class="btn btn-theft" onclick="simulateData(true)">Send Theft Data (5.0A - 10.0A)</button>
            <div id="sim-log" style="font-size: 0.8em; color: #666; margin-top: 5px;"></div>
        </div>

        <div class="chart-grid">
            <div class="chart-box"><canvas id="currentChart"></canvas></div>
            <div class="chart-box"><canvas id="powerChart"></canvas></div>
            <div class="chart-box"><canvas id="energyChart"></canvas></div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";
        
        // Setup Charts
        function createChart(id, label, color) {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label, data: [], borderColor: color, tension: 0.3, fill: false }] },
                options: { 
                    responsive: true, 
                    animation: false,
                    scales: { 
                        x: { display: false }, 
                        y: { beginAtZero: true } 
                    } 
                }
            });
        }

        const currentChart = createChart('currentChart', 'Current (A)', '#007bff');
        const powerChart = createChart('powerChart', 'Power (W)', '#fd7e14');
        const energyChart = createChart('energyChart', 'Energy (kWh)', '#28a745');

        async function simulateData(isTheft) {
            const current = isTheft ? (Math.random() * 5 + 5).toFixed(2) : (Math.random() * 1.5 + 0.5).toFixed(2);
            const power = (current * 230).toFixed(2);
            const energy = (Math.random() * 0.1).toFixed(4);

            document.getElementById('sim-log').innerText = `Sending: ${current}A, ${power}W...`;
            
            try {
                const res = await fetch(`${API_BASE}/data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current, power, energy })
                });
                const data = await res.json();
                document.getElementById('sim-log').innerText = `Backend Result: ${data.prediction} ✅`;
                updateData();
            } catch (err) {
                document.getElementById('sim-log').innerText = "Simulation failed: Server Offline ❌";
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                
                if (data.esp_connected) {
                    document.getElementById('esp32-status').innerHTML = "ESP32 Connected ✅";
                    document.getElementById('ai-status').innerHTML = "AI Start Listening 🤖";
                } else {
                    document.getElementById('esp32-status').innerHTML = "ESP32 Not Connected ❌";
                    document.getElementById('ai-status').innerHTML = "Connect your sensor to predict ⚠️";
                    // Redirect to guide if connection lost
                    setTimeout(() => window.location.href = "connection-guide.html", 2000);
                }
                document.getElementById('connection-error').style.display = 'none';
            } catch (err) {
                document.getElementById('esp32-status').innerHTML = "Server Offline ❌";
                document.getElementById('ai-status').innerHTML = "Waiting for Backend...";
                document.getElementById('connection-error').style.display = 'block';
            }
        }

        async function updateData() {
            try {
                const res = await fetch(`${API_BASE}/history`);
                const history = await res.json();

                if (history && history.length > 0) {
                    const labels = history.map(h => h.timestamp);
                    const currents = history.map(h => h.current);
                    const powers = history.map(h => h.power);
                    const energies = history.map(h => h.energy);
                    const lastPrediction = history[history.length - 1].prediction;

                    updateChart(currentChart, labels, currents);
                    updateChart(powerChart, labels, powers);
                    updateChart(energyChart, labels, energies);

                    const banner = document.getElementById('theft-banner');
                    banner.style.display = (lastPrediction === "THEFT") ? 'block' : 'none';
                }
            } catch (err) {
                console.error("History error:", err);
            }
        }

        function updateChart(chart, labels, data) {
            chart.data.labels = labels;
            chart.data.datasets[0].data = data;
            chart.update();
        }

        setInterval(() => {
            updateStatus();
            updateData();
        }, 3000);

        // Initial calls
        updateStatus();
        updateData();
    </script>
</body>
</html>
