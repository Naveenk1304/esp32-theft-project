<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Connection Guide</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 40px; text-align: center; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #dc3545; }
        .steps { text-align: left; margin: 30px 0; line-height: 1.8; }
        .step { margin-bottom: 15px; padding: 10px; background: #fff8f8; border-left: 4px solid #dc3545; }
        .btn { padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #218838; transform: scale(1.05); }
        #status { margin-top: 20px; font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 not detected ❌</h1>
        <p>We couldn't find your sensor. Please follow these steps:</p>
        
        <div class="steps">
            <div class="step">1. 📶 Connect ESP32 to the <b>same WiFi</b> as this computer.</div>
            <div class="step">2. 🔌 Ensure your ESP32 is <b>powered on</b>.</div>
            <div class="step">3. 📄 Check if the <b>correct IP address</b> is set in your Arduino code.</div>
            <div class="step">4. 🚀 Ensure the <b>Flask backend</b> is running.</div>
        </div>

        <button class="btn" onclick="retry()">Retry Connection</button>
        <p id="status"></p>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";
        async function retry() {
            document.getElementById('status').innerText = "Checking... ⏳";
            try {
                const res = await fetch(`${API_BASE}/sensor-status`);
                const data = await res.json();
                if (data.esp_connected) {
                    document.getElementById('status').innerText = "Connected! Redirecting... ✅";
                    setTimeout(() => window.location.href = "dashboard.html", 1000);
                } else {
                    document.getElementById('status').innerText = "Still not detected. Please check the steps above.";
                }
            } catch (err) {
                document.getElementById('status').innerText = "Server offline ❌";
            }
        }
    </script>
</body>
</html>
